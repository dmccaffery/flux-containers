name: pipeline-tools
description: Install the pinned chart pipeline toolchain via mise (helm, crane, cosign, grype, kubescape, yq, shellcheck, prettier, markdownlint-cli2)

# Tool versions come from two places: the shared toolchain submodule at .mise/
# (config.toml + mise.lock — helm, grype, kubescape, shellcheck, prose tools)
# and the root mise.toml (+ mise.lock) for the pipeline-only additions (crane,
# cosign, yq). mise verifies every download against the lockfiles (plus
# cosign/SLSA/GitHub attestations where the publisher provides them), so no
# system Go or Node is needed anywhere. Callers must check out with
# `submodules: true` so .mise/ exists. mise-action caches the tool store keyed
# on the pins and puts mise shims on PATH, so both `make <target>`
# (→ `mise run`) and direct `scripts/<step>.sh` invocations get the pinned
# tools.
runs:
  using: composite
  steps:
    - name: Set up mise
      uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
      with:
        version: 2026.7.3
        # mise-action verifies the extracted bin/mise binary, not the download:
        # sha256 of bin/mise from mise-v2026.7.3-linux-x64.tar.gz (whose tarball
        # checksum 4cd83913… verifies against the release's SHASUMS256.txt)
        sha256: 06088e84e4514b59fd2b6b17927bcc37aa0ab10020a270868871fb010b92069b
        install: false # trust explicitly first; the step below does the install

    - name: install pinned tools
      shell: bash
      env:
        # mise resolves aqua-backend releases via the GitHub API; unauthenticated
        # calls rate-limit on shared runners
        GITHUB_TOKEN: ${{ github.token }}
      run: |
        mise trust --quiet mise.toml
        mise trust --quiet .mise/config.toml
        mise install
