apiVersion: flux-containers/v1alpha1
name: external-dns
chart:
  # https repo: kubernetes-sigs publishes no OCI chart yet
  # (kubernetes-sigs/external-dns#4630); tgzs are GitHub release assets behind
  # the gh-pages index. Unsigned — documented gap.
  repo: https://kubernetes-sigs.github.io/external-dns/
  name: external-dns
  version: "1.21.1"
  versionConstraint: ">=1.15.0 <2.0.0"
  verifyUpstream:
    provider: none
discovery:
  namespace: external-dns
  valuesFiles: [values/discovery.yaml]
  kubeVersion: "1.34.0"
images:
  extra: []
  exclude: []
  verifyUpstream:
    # registry.k8s.io images are keyless-signed by the kubernetes release
    # promoter. If signature serving regresses for this path (the 2026 image
    # signature routing change), downgrade to provider: none with a comment.
    - match: "registry.k8s.io/external-dns/*"
      provider: cosign-keyless
      certificateIdentityRegexp: "^krel-trust@k8s-releng-prod\\.iam\\.gserviceaccount\\.com$"
      certificateOidcIssuer: "https://accounts.google.com"
scan:
  failOn: [CRITICAL, HIGH]
  ignoreUnfixed: true
publish:
  chartRepo: charts/external-dns
