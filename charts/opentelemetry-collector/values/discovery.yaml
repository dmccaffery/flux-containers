#
# Discovery-only values — LOAD-BEARING here: the chart refuses to render
# without mode, and the runtime (flux-manifests) deploys the -contrib image
# (the googlecloud / googlemanagedprometheus exporters only exist there), so
# discovery must mirror that exact image.
mode: deployment
image:
  repository: ghcr.io/open-telemetry/opentelemetry-collector-releases/opentelemetry-collector-contrib
