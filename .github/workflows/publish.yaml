# Publish — mirror the changed charts' images (by digest) and the charts
# themselves to the platform Artifact Registry, cosign-signing everything
# KEYLESSLY: the job's GitHub OIDC token mints both the GCP access token (via
# Workload Identity Federation, impersonating the chart-publisher service
# account the artifact-store terraform created) and the Fulcio signing
# certificate. Consumers pin this workflow's exact identity
# (…/flux-containers/.github/workflows/publish.yaml@refs/heads/main), which is
# why the job is hard-guarded to main: a dispatch from any other ref would
# mint a different certificate subject than the clusters verify.
name: publish

on:
  push:
    branches: [main]
    paths:
      - "charts/**"
  workflow_dispatch:
    inputs:
      chart:
        description: Chart to (re)publish
        required: true

permissions: {}

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      # WIF token exchange + cosign keyless both ride the job's OIDC token
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          submodules: true

      - name: install tools
        uses: ./.github/actions/pipeline-tools

      - name: detect charts to publish
        id: charts
        env:
          INPUT_CHART: ${{ inputs.chart }}
          BEFORE: ${{ github.event.before }}
        run: |
          if [ -n "$INPUT_CHART" ]; then
            changed="$INPUT_CHART"
          else
            changed="$(git diff --name-only "$BEFORE"..HEAD -- charts/ | cut -d/ -f2 | sort -u | xargs)"
          fi
          echo "changed=$changed" >> "$GITHUB_OUTPUT"
          echo "publishing: $changed"

      - name: authenticate to Google Cloud
        if: steps.charts.outputs.changed != ''
        id: auth
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          # artifact-store module outputs, mirrored as org-level Actions variables
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_CHART_PUBLISHER_SA }}
          token_format: access_token

      - name: login to Artifact Registry
        if: steps.charts.outputs.changed != ''
        env:
          ACCESS_TOKEN: ${{ steps.auth.outputs.access_token }}
        run: |
          host="$(yq '.registry.url' config/global.yaml | cut -d/ -f1)"
          helm registry login "$host" --username oauth2accesstoken --password-stdin <<<"$ACCESS_TOKEN"
          # crane auth login writes the docker keychain, which cosign also reads
          crane auth login "$host" --username oauth2accesstoken --password-stdin <<<"$ACCESS_TOKEN"

      - name: re-verify and publish
        if: steps.charts.outputs.changed != ''
        run: |
          # Defense in depth: provenance is re-verified on main before anything is pushed,
          # so nothing merged around the PR gate gets signed with the platform identity.
          for chart in ${{ steps.charts.outputs.changed }}; do
            scripts/verify-upstream.sh "$chart"
            scripts/publish-images.sh "$chart"
            scripts/publish-chart.sh "$chart"
          done

      - name: job summary
        if: steps.charts.outputs.changed != ''
        run: |
          {
            echo "## Published"
            for chart in ${{ steps.charts.outputs.changed }}; do
              echo "### \`$chart\`"
              echo '```yaml'
              cat "charts/$chart/images.lock.yaml"
              echo '```'
            done
          } >> "$GITHUB_STEP_SUMMARY"
