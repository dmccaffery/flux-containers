{{- if and .Values.web.config .Values.web.configSecretName -}}
{{- fail "Invalid values: 'web.config' and 'web.configSecretName' cannot both be set. Set at most one." -}}
{{- end -}}
{{- if include "flux-operator.createWebConfigSecret" . -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "flux-operator.fullname" . }}-web-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "flux-operator.labels" . | nindent 4 }}
    {{- with .Values.commonLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
type: Opaque
stringData:
  config.yaml: |
    apiVersion: web.fluxcd.controlplane.io/v1
    kind: Config
    spec:
      {{- /* Validate the access mode and inject it into the rendered config so it stays in sync with the web ClusterRole. */}}
      {{- $_ := include "flux-operator.webFineGrained" . }}
      {{- $config := deepCopy .Values.web.config }}
      {{- $access := dig "userActions" "access" "Impersonated" .Values.web }}
      {{- $userActions := merge (dict "access" $access) (dig "userActions" dict $config) }}
      {{- $_ := set $config "userActions" $userActions }}
      {{- toYaml $config | nindent 6 }}
{{- end }}
