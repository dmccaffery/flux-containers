# Daily upstream version sweep: for each chart whose versionConstraint admits
# a newer upstream release, bump the pin, regenerate all derived state and
# open (or refresh) a feat(<chart>) PR. The PR's vendor/rendered diff is the
# reviewable change; pr-validate posts provenance + scan results on it.
name: Update Charts

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      chart:
        description: Only check this chart
        required: false

permissions:
  contents: write
  pull-requests: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: true

      - name: install tools
        uses: ./.github/actions/pipeline-tools

      - name: open bump PRs
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_CHART: ${{ inputs.chart }}
        run: |
          # shellcheck disable=SC2016 # the backticked markdown in the pr-body printf is literal
          set -euo pipefail
          git config user.name "chart-update-bot"
          git config user.email "chart-update-bot@users.noreply.github.com"

          all_charts="$(ls charts)"
          requested="$INPUT_CHART"
          [ -n "$requested" ] || requested="$all_charts"

          # Charts declaring .chart.lockstep share an upstream version stream
          # and MUST move in one PR: a half-merged pair publishes an operator
          # whose embedded flux release references controller images the
          # mirror doesn't carry yet (or vice versa), stalling every cluster
          # that picks it up. Standalone charts are their own group.
          group_for() {
            local g
            g="$(yq '.chart.lockstep // ""' "charts/$1/manifest.yaml")"
            [ -n "$g" ] && echo "$g" || echo "$1"
          }

          groups=""
          for chart in $requested; do
            groups="$groups $(group_for "$chart")"
          done
          groups="$(echo "$groups" | tr ' ' '\n' | sort -u | grep .)"

          for group in $groups; do
            members=""
            for chart in $all_charts; do
              [ "$(group_for "$chart")" = "$group" ] && members="$members $chart"
            done

            # The group target is the LOWEST of the members' newest
            # satisfying versions: upstream publishes lockstep charts
            # near-simultaneously, and holding the bump until every member
            # carries the tag is what prevents the half-mirrored release.
            target=""
            for chart in $members; do
              current="$(yq '.chart.version' "charts/$chart/manifest.yaml")"
              new="$(scripts/check-updates.sh "$chart" | tail -1)"
              [ -n "$new" ] || new="$current"
              if [ -z "$target" ] || [ "$(printf '%s\n%s\n' "$new" "$target" | sort -V | head -1)" = "$new" ]; then
                target="$new"
              fi
            done

            bumped=""
            for chart in $members; do
              [ "$(yq '.chart.version' "charts/$chart/manifest.yaml")" != "$target" ] && bumped="$bumped $chart"
            done
            [ -n "$bumped" ] || continue

            branch="update/$group-$target"
            if gh pr list --head "$branch" --state open --json number --jq length | grep -qv '^0$'; then
              echo "PR for $branch already open; skipping"
              continue
            fi

            git switch -C "$branch" origin/main
            summary=""
            for chart in $bumped; do
              current="$(yq '.chart.version' "charts/$chart/manifest.yaml")"
              NEW="$target" yq -i '.chart.version = env(NEW)' "charts/$chart/manifest.yaml"
              make refresh CHART="$chart"
              git add "charts/$chart"
              # shellcheck disable=SC2016 # the backticked markdown in the printf format is literal
              summary="$(printf '%s`%s` **%s → %s**\n' "$summary" "$chart" "$current" "$target")"
            done
            git commit -m "feat($group): update chart to $target"
            git push -f origin "$branch"

            # shellcheck disable=SC2016 # the backticked markdown in the printf format is literal
            gh pr create \
              --head "$branch" \
              --title "feat($group): update chart to $target" \
              --body "$(printf 'Automated chart bump:\n\n%s\nThe diff of `vendor/` and `rendered/` below is the reviewable change; `images.lock.yaml` carries the resolved image set. pr-validate posts provenance and scan results as a sticky comment.\n' "$summary")"
            git switch main
          done
