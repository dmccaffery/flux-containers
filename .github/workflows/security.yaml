# Security analysis — thin caller for the org's reusable security workflow. It
# runs CodeQL over the repository's GitHub Actions workflows (build-free), on
# every push and pull request plus a weekly scheduled run so newly published
# queries reach already-merged code.
#
# languages is pinned to "actions": the pipeline is bash + yaml — there is no
# Go or JavaScript product code to scan. Supply-chain scanning of the mirrored
# charts and images (grype/kubescape) is the pipeline's own job (pr-validate,
# rescan), not CodeQL's.
#
# The reusable workflow is pinned to a full commit SHA (tag in the comment) so a
# moved tag can never change what runs; Dependabot keeps the pin fresh.
name: Security Analysis

on:
    push:
        branches: [main]
    pull_request:
    schedule:
        - cron: "41 21 * * 4"

# ceiling for the reusable workflow's analyze job
permissions:
    # upload analysis results to code scanning
    security-events: write
    # fetch internal or private CodeQL packs
    packages: read
    # only required for workflows in private repositories
    actions: read
    # check out the repository
    contents: read

jobs:
    analyze:
        uses: bitwise-media-group/github-workflows/.github/workflows/security.yaml@3636c830f0b00c591f8b27401c45786d08466f18 # v6.0.0
        with:
            languages: actions
