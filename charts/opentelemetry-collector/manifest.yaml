apiVersion: flux-containers/v1alpha1
name: opentelemetry-collector
chart:
  repo: oci://ghcr.io/open-telemetry/opentelemetry-helm-charts
  name: opentelemetry-collector
  version: "0.165.0"
  versionConstraint: ">=0.130.0 <1.0.0"
  # open-telemetry publishes the OCI charts unsigned — documented gap. The
  # collector images below are keyless-signed by their release workflow.
  verifyUpstream:
    provider: none
discovery:
  namespace: otel-collector
  valuesFiles: [values/discovery.yaml]
  kubeVersion: "1.34.0"
images:
  extra: []
  exclude: []
  verifyUpstream:
    - match: "ghcr.io/open-telemetry/opentelemetry-collector-releases/*"
      provider: cosign-keyless
      certificateIdentityRegexp: "^https://github.com/open-telemetry/opentelemetry-collector-releases/"
      certificateOidcIssuer: "https://token.actions.githubusercontent.com"
scan:
  failOn: [CRITICAL, HIGH]
  ignoreUnfixed: true
publish:
  chartRepo: charts/opentelemetry-collector
