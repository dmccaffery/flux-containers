# Continuous integration — thin caller for the org's reusable ci workflow (v5+:
# mise-task aware). It discovers the canonical tasks this repo defines and runs
# `make lint` — the repo-wide gates: chart manifest/allowlist lint, shellcheck,
# addlicense, actionlint and prose. The deep per-chart pipeline (regeneration
# gate, provenance verification, scans) is pr-validate.yaml, which only runs
# when chart-affecting paths change.
#
# The reusable workflow is pinned to a full commit SHA (tag in the comment) so a
# moved tag can never change what runs; Dependabot keeps the pin fresh.
name: Continuous Integration

on:
    push:
        branches: [main]
    pull_request:

# the reusable workflow's jobs only need contents:read; grant just that ceiling
permissions:
    contents: read

jobs:
    ci:
        uses: bitwise-media-group/github-workflows/.github/workflows/ci.yaml@3636c830f0b00c591f8b27401c45786d08466f18 # v6.0.0
